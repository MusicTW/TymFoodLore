enabled: true

vanilla:
  enabled: true
  use-paper-data-components: true
  # 避免 ItemsAdder 物品在 IA API 尚未就緒時被當成原版食物。
  skip-items-with-custom-model-data: true
  # 這類物品的效果本來就帶有未知感，只顯示有隱藏效果，不直接揭露內容。
  hidden-effect-materials:
    - SUSPICIOUS_STEW

itemsadder:
  enabled: true
  contents-path: plugins/ItemsAdder/contents
  # 保留 ItemsAdder 掃描能力；測試服移除 IA jar 時 API 會自動略過。
  delayed-rescan-seconds: 0

nexo:
  enabled: true
  items-path: plugins/Nexo/items
  items-paths:
    - plugins/Nexo/items

