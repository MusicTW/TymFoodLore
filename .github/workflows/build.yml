name: Build

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build
        shell: pwsh
        run: ./build.ps1

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: TymFoodLore
          path: build/libs/*.jar
